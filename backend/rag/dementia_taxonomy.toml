# Dementia disease taxonomy — shared relevance filter for all knowledge sources.
#
# Used during ingestion to determine whether a document is in scope.
# Each section defines one dementia type with its relevant clinical stages
# and search terms (aliases, subtypes, biomarkers, key interventions).
#
# A document is in scope if it matches at least one entry's terms
# AND at least one of its listed stages.

# ── Alzheimer's disease ───────────────────────────────────────────────────────

[alzheimers]
name   = "Alzheimer's disease"
stages = ["screening", "diagnosis", "prevention", "treatment", "care"]
terms  = [
    "Alzheimer", "Alzheimer disease", "Alzheimer's disease",
    "AD", "amyloid", "tau", "ATN framework",
    "early-onset Alzheimer", "late-onset Alzheimer",
    "posterior cortical atrophy", "PCA",
    "APOE", "PSEN1", "PSEN2", "APP",
    "lecanemab", "donanemab", "aducanumab",
    "ARIA", "anti-amyloid",
    "donepezil", "galantamine", "memantine",
]

