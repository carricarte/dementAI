# PubMed search queries for the DementIA knowledge base.
# All queries use MeSH (Medical Subject Headings) field tags for precision and recall.
# Format: "MeSH Term"[MeSH Terms] AND/OR "Other Term"[MeSH Terms]
# Use [Title/Abstract] only when no MeSH heading exists for a concept.
# Publication type filters: [Publication Type] — e.g. "Randomized Controlled Trial"[Publication Type]
#
# Run:  python scripts/ingest.py --source pubmed [--drop]

[settings]
max_results_per_query = 100   # articles per query (sorted by relevance)
date_range_years      = 15    # restrict to last N years

[queries]

# ── Screening ────────────────────────────────────────────────────────────────
screening = [
    # General cognitive assessment tools
    '"Mental Status and Dementia Tests"[MeSH Terms]',
    '"Neuropsychological Tests"[MeSH Terms] AND "Dementia"[MeSH Terms]',
    '"Cognitive Dysfunction"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"Dementia"[MeSH Terms] AND "Mass Screening"[MeSH Terms] AND "Primary Health Care"[MeSH Terms]',

    # Alzheimer's disease — screening
    '"Alzheimer Disease"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"Alzheimer Disease"[MeSH Terms] AND "Mass Screening"[MeSH Terms]',
    '"Alzheimer Disease"[MeSH Terms] AND "Biomarkers"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"Alzheimer Disease"[MeSH Terms] AND "Blood"[MeSH Terms] AND "Biomarkers"[MeSH Terms]',

    # Blood-based biomarkers — cross-type
    '"tau Proteins"[MeSH Terms] AND "Blood"[MeSH Terms] AND "Dementia"[MeSH Terms]',
    '"Amyloid beta-Peptides"[MeSH Terms] AND "Blood"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"Neurofilament Proteins"[MeSH Terms] AND "Blood"[MeSH Terms] AND "Dementia"[MeSH Terms]',
    'phospho-tau 217[Title/Abstract] AND "Alzheimer Disease"[MeSH Terms]',

    # Vascular dementia — screening
    '"Dementia, Vascular"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"Dementia, Vascular"[MeSH Terms] AND "Neuropsychological Tests"[MeSH Terms]',
    '"Cerebral Small Vessel Diseases"[MeSH Terms] AND "Cognitive Dysfunction"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',

    # Lewy body dementia — screening
    '"Lewy Body Disease"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"REM Sleep Behavior Disorder"[MeSH Terms] AND "Lewy Body Disease"[MeSH Terms]',
    '"Lewy Body Disease"[MeSH Terms] AND "Prodromal Symptoms"[MeSH Terms]',

    # FTD behavioral — screening
    '"Frontotemporal Dementia"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"Frontotemporal Dementia"[MeSH Terms] AND "Neuropsychological Tests"[MeSH Terms]',

    # Parkinson dementia — screening
    '"Parkinson Disease"[MeSH Terms] AND "Cognitive Dysfunction"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"Parkinson Disease"[MeSH Terms] AND "Dementia"[MeSH Terms] AND "Neuropsychological Tests"[MeSH Terms]',

    # Huntington disease — screening
    '"Huntington Disease"[MeSH Terms] AND "Mass Screening"[MeSH Terms]',
    '"Huntington Disease"[MeSH Terms] AND "Neuropsychological Tests"[MeSH Terms]',
    '"Huntington Disease"[MeSH Terms] AND "Prodromal Symptoms"[MeSH Terms]',

    # CTE — screening
    '"Chronic Traumatic Encephalopathy"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',
    '"Brain Concussion"[MeSH Terms] AND "Cognitive Dysfunction"[MeSH Terms] AND "Biomarkers"[MeSH Terms]',

    # HIV dementia — screening
    '"AIDS Dementia Complex"[MeSH Terms] AND "Mass Screening"[MeSH Terms]',
    '"AIDS Dementia Complex"[MeSH Terms] AND "Neuropsychological Tests"[MeSH Terms]',

    # Wernicke-Korsakoff — screening
    '("Wernicke Encephalopathy"[MeSH Terms] OR "Korsakoff Syndrome"[MeSH Terms]) AND "Early Diagnosis"[MeSH Terms]',
    '"Thiamine Deficiency"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',

    # Down syndrome dementia — screening
    '"Down Syndrome"[MeSH Terms] AND "Alzheimer Disease"[MeSH Terms] AND "Mass Screening"[MeSH Terms]',
    '"Down Syndrome"[MeSH Terms] AND "Cognitive Dysfunction"[MeSH Terms] AND "Early Diagnosis"[MeSH Terms]',

    # MCI — screening
    '"Cognitive Dysfunction"[MeSH Terms] AND "Mass Screening"[MeSH Terms]',
    '"Cognitive Dysfunction"[MeSH Terms] AND "Neuropsychological Tests"[MeSH Terms] AND "Primary Health Care"[MeSH Terms]',
    '"Cognitive Dysfunction"[MeSH Terms] AND "Biomarkers"[MeSH Terms] AND "Prognosis"[MeSH Terms]',
    'subjective cognitive decline[Title/Abstract] AND "Biomarkers"[MeSH Terms]',

    # Psychometric validation — CDR / CDR-SB / MMSE score interpretation
    '"Clinical Dementia Rating"[MeSH Terms] AND "Sensitivity and Specificity"[MeSH Terms]',
    '"Clinical Dementia Rating"[MeSH Terms] AND "Alzheimer Disease"[MeSH Terms] AND "Validation Studies as Topic"[MeSH Terms]',
    'CDR sum of boxes[Title/Abstract] AND "Alzheimer Disease"[MeSH Terms]',
    'CDR-SB[Title/Abstract] AND "Clinical Trials as Topic"[MeSH Terms]',
    '"Mini-Mental State Examination"[MeSH Terms] AND "Sensitivity and Specificity"[MeSH Terms]',
    '"Mini-Mental State Examination"[MeSH Terms] AND "Dementia"[MeSH Terms] AND "Cutoff"[Title/Abstract]',
    '"Geriatric Assessment"[MeSH Terms] AND "Sensitivity and Specificity"[MeSH Terms] AND "Dementia"[MeSH Terms]',
    '"Montreal Cognitive Assessment"[MeSH Terms] AND "Sensitivity and Specificity"[MeSH Terms]',
    '"Neuropsychological Tests"[MeSH Terms] AND "Psychometrics"[MeSH Terms] AND "Dementia"[MeSH Terms]',

    # Age-stratified screening thresholds
    '"Age Factors"[MeSH Terms] AND "Dementia"[MeSH Terms] AND "Mass Screening"[MeSH Terms]',
    'screening age threshold[Title/Abstract] AND "Dementia"[MeSH Terms]',
]

