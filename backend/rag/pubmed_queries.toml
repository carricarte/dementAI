# PubMed search queries for the DementIA knowledge base.
# Each string is sent verbatim to NCBI E-utilities esearch (relevance-sorted).
# Organised by clinical stage; within each stage queries are grouped by topic
# or dementia type. Add / remove lines freely — one query per line.
#
# Run:  python scripts/ingest.py --source pubmed [--drop]

[settings]
max_results_per_query = 100   # articles per query (sorted by relevance)
date_range_years      = 10    # restrict to last N years

[queries]

# ── Screening ────────────────────────────────────────────────────────────────
screening = [
    # General cognitive assessment
    "MMSE Mini-Mental State Examination sensitivity specificity dementia",
    "MoCA Montreal Cognitive Assessment validation mild cognitive impairment",
    "CDR Clinical Dementia Rating scale administration reliability",
    "ADAS-Cog Alzheimer Assessment Scale clinical trials validity",
    "brief cognitive screening primary care older adults",
    "neuropsychological battery dementia differential diagnosis",
    "subjective cognitive decline preclinical dementia biomarkers",
    "mild cognitive impairment MCI diagnostic criteria conversion rate",
    "cognitive screening blood-based biomarkers Alzheimer early detection",
    "delirium cognitive impairment differential diagnosis assessment",
    "geriatric depression GDS cognitive testing confounding",

    # Type-specific screening approaches
    "Alzheimer disease preclinical screening amyloid PET blood biomarkers",
    "Parkinson disease cognitive screening MCI PDD",
    "Huntington disease cognitive assessment prodromal",
    "Down syndrome dementia screening cognitive decline trisomy 21",
    "HIV neurocognitive disorder screening battery HAND",
]

